<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SealVault Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800;900&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #F5FDE3;
      display: flex; align-items: flex-start; justify-content: center;
      font-family: 'Inter', system-ui, sans-serif; color: #000; padding: 60px 20px;
    }
    .wrap { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center; width: 100%; }

    .card {
      background: #FFFFFF; border: 3px solid #000;
      border-radius: 16px; padding: 40px; width: 100%; max-width: 420px;
      box-shadow: 8px 8px 0px #000;
    }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo-icon {
      width: 48px; height: 48px;
      background: #93fca1;
      border: 3px solid #000; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 4px 4px 0px #000;
    }
    h2 { font-size: 28px; font-weight: 900; color: #000; margin-bottom: 8px; text-transform: uppercase; letter-spacing: -0.02em; }
    .subtitle { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 32px; }
    label { display: block; font-size: 14px; color: #000; margin-bottom: 8px; font-weight: 800; text-transform: uppercase; }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; background: #fff; border: 2px solid #000;
      border-radius: 10px; padding: 12px 16px; font-size: 15px; color: #000; font-weight: 500;
      outline: none; transition: all 0.2s; margin-bottom: 20px;
      box-shadow: 4px 4px 0px #000;
    }
    input:focus { border-color: #000; box-shadow: 6px 6px 0px #8795fc; transform: translate(-2px, -2px); }
    button[type="submit"] {
      width: 100%; background: #8795fc; color: #000; font-weight: 800;
      font-size: 16px; border: 3px solid #000; border-radius: 12px; padding: 14px; cursor: pointer;
      box-shadow: 6px 6px 0px #000; transition: all 0.15s; text-transform: uppercase; margin-top: 8px;
    }
    button[type="submit"]:hover { transform: translate(2px, 2px); box-shadow: 4px 4px 0px #000; background: #9da8ff; }
    button[type="submit"]:active { transform: translate(6px, 6px); box-shadow: 0px 0px 0px #000; }
    .hint { margin-top: 24px; padding: 16px; background: #fcf482; border: 2px solid #000; border-radius: 12px; font-size: 13px; color: #000; font-weight: 600; line-height: 1.6; box-shadow: 4px 4px 0px #000; }
    .hint b { color: #000; font-weight: 800; text-decoration: underline; text-decoration-thickness: 2px; }
    .success-msg { display: none; margin-top: 20px; padding: 12px; background: #93fca1; border: 2px solid #000; border-radius: 10px; text-align: center; color: #000; font-size: 14px; font-weight: 800; box-shadow: 4px 4px 0px #000; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <span style="font-size:20px;font-weight:900;color:#000;">SEAL<span style="color:#8795fc;">VAULT</span></span>
    </div>
    <h2>Sign in</h2>
    <p class="subtitle">Test page — try auto-fill &amp; auto-save</p>
    <form id="login-form" onsubmit="handleSubmit(event)">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Your password" />
      <button type="submit">Sign in</button>
    </form>
    <div class="success-msg" id="success">✓ Submitted! SealVault should prompt to save.</div>
  </div>
</div>
<script>
  function handleSubmit(e) {
    e.preventDefault();
    const s = document.getElementById('success');
    s.style.display = 'block';
    setTimeout(() => { s.style.display = 'none'; }, 4000);
  }
</script>
</body>
</html>
